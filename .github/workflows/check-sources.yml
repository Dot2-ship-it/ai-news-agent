name: Check Source Discovery

on:
  workflow_dispatch:

jobs:
  check-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/check_sources.py --sources reuters_ai,data_center_dynamics_ai --max-candidates 3
